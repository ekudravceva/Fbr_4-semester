services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    networks:
      - app-network
    depends_on:
      - backend1
      - backend2
      - backend3

  backend1:
    build: .
    environment:
      - PORT=3000
      - SERVER_ID=backend-1
    networks:
      - app-network

  backend2:
    build: .
    environment:
      - PORT=3000
      - SERVER_ID=backend-2
    networks:
      - app-network

  backend3:
    build: .
    environment:
      - PORT=3000
      - SERVER_ID=backend-3
    networks:
      - app-network

networks:
  app-network:
    driver: bridge