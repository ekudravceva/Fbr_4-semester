http {
    upstream backend {
        server host.docker.internal:3000 max_fails=2 fail_timeout=30s;
        server host.docker.internal:3001 max_fails=2 fail_timeout=30s;
        server host.docker.internal:3002 backup;
    }

    server {
        listen 80;
        
        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}

events {}